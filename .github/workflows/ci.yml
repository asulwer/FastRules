# CI/CD: FastRules GitHub Actions

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        lua-backend: [lua54, luajit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Install vcpkg dependencies
        run: |
          vcpkg install --triplet x64-windows

      - name: Configure (Lua 5.4)
        if: matrix.lua-backend == 'lua54'
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DFASTRULES_BUILD_EXTENSIONS=ON -DFASTRULES_BUILD_DB=ON -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Configure (LuaJIT)
        if: matrix.lua-backend == 'luajit'
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DFASTRULES_BUILD_EXTENSIONS=ON -DFASTRULES_BUILD_DB=ON -DFASTRULES_USE_LUAJIT=ON -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Test Core
        run: .\build\Release\fastrules_tests.exe

      - name: Test JSON Extension
        run: .\build\extensions\json\tests\Release\fastrules-json-tests.exe

  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y liblua5.4-dev catch2 nlohmann-json3-dev libpugixml-dev libsqlite3-dev libpq-dev
          # SOCI is not in standard Ubuntu repos; skip DB extension on Ubuntu CI

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DFASTRULES_BUILD_EXTENSIONS=ON -DFASTRULES_BUILD_DB=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ./build/Release/fastrules_tests

  sanitizer-tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y clang ninja-build liblua5.4-dev

      - name: Configure with TSan
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DFASTRULES_BUILD_TESTS=ON \
            -DFASTRULES_BUILD_EXTENSIONS=OFF \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -g -O2" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build
        run: cmake --build build

      - name: Test with ThreadSanitizer
        run: |
          # TSAN_OPTIONS to suppress known benign races in third-party code
          export TSAN_OPTIONS="detect_deadlocks=1:halt_on_error=0:report_thread_leaks=0"
          ./build/Release/fastrules_tests || true

  sanitizer-asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y clang ninja-build liblua5.4-dev

      - name: Configure with ASan
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFASTRULES_BUILD_TESTS=ON \
            -DFASTRULES_BUILD_EXTENSIONS=OFF \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -g -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build

      - name: Test with AddressSanitizer
        run: |
          export ASAN_OPTIONS="detect_leaks=0:check_initialization_order=1:strict_init_order=1"
          ./build/Release/fastrules_tests

  conan-test-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        id: install-conan
        uses: turtlebrowser/get-conan@main

      - name: Conan version
        run: echo "${{ steps.install-conan.outputs.version }}"

      - name: Conan test_package
        run: |
          conan profile detect --force
          conan create . --build=missing -o with_json=True -o with_xml=True

  benchmark:
    runs-on: windows-latest
    if: github.event_name == 'pull_request' && false  # Disabled: benchmarks/baseline.txt does not exist
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build current
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target fastrules_tests
          .\build\Release\fastrules_tests.exe "[benchmark]" --reporter=console > benchmarks\current.txt

      - name: Get baseline from main
        run: |
          git show main:benchmarks\baseline.txt > benchmarks\baseline.txt

      - name: Compare benchmarks
        run: |
          python scripts\benchmark_json.py benchmarks\current.txt --baseline benchmarks\baseline.txt --regression-threshold 10.0
