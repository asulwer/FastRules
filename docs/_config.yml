# Jekyll configuration for GitHub Pages using just-the-docs theme
# https://just-the-docs.github.io/just-the-docs/

title: FastRules
description: >-
  High-performance C++23 business rules engine with Lua expressions.
  Core library is dependency-light; persistence extensions add JSON, XML, or database support as needed.

baseurl: "/fastrules"
url: "https://asulwer.github.io"

# just-the-docs theme - installed via remote_theme (GitHub Pages compatible)
remote_theme: just-the-docs/just-the-docs@v0.10.0

# Color scheme
# color_scheme: fastrules

# Search enabled
search_enabled: true

# Navigation structure - top-level pages
nav_external_links:
  - title: "GitHub"
    url: "https://github.com/asulwer/fastrules"
    hide_icon: false

# Plugins supported by GitHub Pages
plugins:
  - jekyll-relative-links
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - "*.gemspec"
  - "README.md"

# Footer
footer_content: "Copyright &copy; 2026 Aaron Sulwer. Distributed under the MIT license."

# Aux links (top right)
aux_links:
  "FastRules on GitHub":
    - "https://github.com/asulwer/fastrules"

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchor links
heading_anchors: true
